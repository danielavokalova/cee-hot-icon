<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEE Hot Icon — Download</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #e8eeff; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #2563eb; padding: 26px 40px; display: flex; align-items: center; justify-content: center; }
    .logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
    .logo-text { color: #fff; line-height: 1.1; }
    .logo-text .brand { font-size: 2.4rem; font-weight: 900; letter-spacing: -.02em; }
    .logo-text .tagline { font-size: .88rem; opacity: .9; letter-spacing: .06em; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 24px; }
    .card { background: #fff; border-radius: 24px; box-shadow: 0 8px 48px rgba(37,99,235,.12); max-width: 640px; width: 100%; padding: 56px 52px 48px; text-align: center; }
    h1 { font-size: 2.3rem; font-weight: 800; color: #0f172a; line-height: 1.2; margin-bottom: 14px; }
    .subtitle { font-size: 1rem; color: #64748b; margin-bottom: 40px; }
    .btn { display: block; width: 100%; background: #2563eb; color: #fff; font-size: 1rem; font-weight: 700; padding: 18px 24px; border-radius: 12px; border: none; cursor: pointer; margin-bottom: 12px; transition: background .15s; }
    .btn:hover { background: #1d4ed8; }
    .direct-link { display: inline-block; margin-top: 10px; color: #2563eb; font-weight: 700; font-size: .95rem; text-decoration: none; }
    .direct-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="#">
      <svg width="74" height="74" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs><clipPath id="gc"><circle cx="48" cy="54" r="33"/></clipPath></defs>
        <!-- Outer ring -->
        <circle cx="48" cy="54" r="36" fill="none" stroke="white" stroke-width="2.5"/>
        <!-- Main swoosh — thick diagonal front arc -->
        <path d="M 12,54 C 20,4 76,104 84,54"
              fill="none" stroke="white" stroke-width="18" stroke-linecap="round" clip-path="url(#gc)"/>
        <!-- Back arc — slightly thinner -->
        <path d="M 12,54 C 20,104 76,4 84,54"
              fill="none" stroke="white" stroke-width="14" stroke-linecap="round" clip-path="url(#gc)"/>
        <!-- Airplane — upper right, ~38° -->
        <g transform="translate(74, 20) rotate(-38) scale(0.20)">
          <path d="M -62,0 C -50,-13 34,-15 74,-2 C 34,11 -50,13 -62,0 Z" fill="white"/>
          <path d="M 4,-15 L 36,-58 L 62,-53 L 23,-11 Z" fill="white"/>
          <path d="M -52,-1 L -70,-28 L -55,-25 L -49,-1 Z" fill="white"/>
        </g>
      </svg>
      <div class="logo-text">
        <div class="brand">CEE</div>
        <div class="tagline">Travel Systems</div>
      </div>
    </a>
  </header>
  <main>
    <div class="card">
      <h1>Download your hot icon for CEE admin console</h1>
      <p class="subtitle">One click download. Place the shortcut on your desktop, then drag it to the taskbar.</p>
      <button class="btn" onclick="downloadWindows()">Download CEE badge for windows</button>
      <button class="btn" onclick="downloadLinux()">Download CEE badge for linux</button>
      <a href="https://bo.golibe.com/" class="direct-link" target="_blank">Direct link to CEE backoffice</a>
    </div>
  </main>
  <script>
    function downloadWindows() {
      var content = '[InternetShortcut]\r\nURL=https://bo.golibe.com/\r\nIconFile=https://danielavokalova.github.io/cee-hot-icon/icon.svg\r\nIconIndex=0\r\n';
      var a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([content], {type:'text/plain'}));
      a.download = 'CEE-Admin-Console.url';
      a.click();
    }
    function downloadLinux() {
      var content = '[Desktop Entry]\nVersion=1.0\nType=Application\nName=CEE Admin Console\nExec=xdg-open https://bo.golibe.com/\nIcon=https://danielavokalova.github.io/cee-hot-icon/icon.svg\nTerminal=false\n';
      var a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([content], {type:'application/octet-stream'}));
      a.download = 'CEE-Admin-Console.desktop';
      a.click();
    }
  </script>
</body>
</html>
